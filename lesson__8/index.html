<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/reset.css">
	<link rel="stylesheet" href="css/style.css">

	<title>lesson 8</title>
</head>

<body>
	<header class="header"></header>
	<main class="page">
		<div class="logo">
			<h2 class="logo__title title">іконка/елемент дизайну/svg</h2>
			<img src="image/vektor/label.svg" alt="label">
		</div>

		<div class="icon">
			<h2 class="icon__title title">іконки/вектор/svg</h2>
			<img src="image/vektor/cleave.svg" alt="cleave">
			<img src="image/vektor/like.svg" alt="like">
			<img src="image/vektor/person.svg" alt="person">
			<img src="image/vektor/search.svg" alt="search">
		</div>

		<div class="picture">
			<h2 class="picture__title title">контентні зображення/растрове зображення/webp/avif</h2>

			<picture>
				<source srcset="image/rastr/main/mainpict.avif 1x, image/rastr/main/mainpict2x.avif 2x, image/rastr/main/mainpict3x.avif 3x" type="avif">
				<img src="image/rastr/main/mainpict.webp" alt="image">
			</picture>

		</div>

		<div class="content">
			<h2 class="content__title title">контентні зображення/растрове зображення/webp/avif</h2>
			<img src="image/rastr/content/pict1.webp" alt="picture1">
			<img src="image/rastr/content/pict2.webp" alt="picture2">
			<img src="image/rastr/content/pict3.webp" alt="picture3">
		</div>
	</main>
	<footer class="footer"></footer>
</body>

</html>
